    <title>ChronosGlobe: El Mundo Histórico</title>
    <style>
        /* checkpoint */
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Contenedor de la barra de años superior */
        #ui-container {
            position: absolute;
            top: 30px;
            /* Padding desde arriba */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 20px;
            z-index: 100;
            border: 1px solid rgba(255, 152, 0, 0.2);
        }

        #year-slider {
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            accent-color: #ff9800;
        }

        .year-label {
            font-size: 2rem;
            font-weight: bold;
            color: #ff9800;
        }

        #tooltip {
            position: absolute;
            display: none;
            background: rgba(10, 10, 10, 0.98);
            color: white;
            padding: 20px;
            border: 1px solid #ff9800;
            border-radius: 10px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.8);

            @media(max-width: 768px) {
                box-sizing: border-box;
                max-width: calc(100vw - 20px);
                width: 300px;
            }
        }

        h3 {
            margin: 0 0 5px 0;
            color: #ff9800;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: bold;
            background: #ff9800;
            color: black;
            padding: 2px 5px;
            border-radius: 3px;
            margin-bottom: 10px;
            display: inline-block;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #ccc;
            margin: 0;
        }

        /* Panel de Información Lateral */
        #info-panel {
            position: absolute;
            bottom: 30px;
            right: 30px;
            /* Padding desde la derecha */
            width: 320px;
            background: rgba(10, 10, 10, 0.95);
            padding: 25px;
            /* Más padding interno para legibilidad */
            border-radius: 15px;
            border: 1px solid rgba(255, 152, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        /* --- AJUSTES PARA MÓVIL --- */
        @media (max-width: 768px) {
            #ui-container {
                top: 10px;
                padding: 10px;
            }

            .year-label {
                font-size: 1.5rem;
            }

            #info-panel {
                right: 5%;
                left: 5%;
                /* Centrado en móvil */
                width: 90%;
                bottom: 20px;
                padding: 20px;
                box-sizing: border-box;
                /* Evita que el panel se salga por los lados */
                max-height: 40vh;
                /* Para que no tape toda la pantalla */
                overflow-y: auto;
            }
        }
    </style>
</head>

        const globeGeometry = new THREE.SphereGeometry(1, 64, 64);

            map: textureDay,
            metalness: 0.1,
            roughness: 0.8

            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() - 0.5) * 2000;
            starVertices.push(x, y, z);

            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(-rad * Math.sin(phi) * Math.cos(theta), rad * Math.cos(phi), rad * Math.sin(phi) * Math.sin(theta));
        }

        // Función para saber si un punto está dentro de un polígono 2D
        function isPointInPoly(pt, poly) {
            let isInside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                if (((poly[i][1] > pt[1]) !== (poly[j][1] > pt[1])) &&
                    (pt[0] < (poly[j][0] - poly[i][0]) * (pt[1] - poly[i][1]) / (poly[j][1] - poly[i][1]) + poly[i][0])) {
                    isInside = !isInside;
                }
            }
            return isInside;
        }

        // --- VARIABLES DE ESTADO GLOBALES ---
        let currentEmpiresData = [];
        let currentEventsData = []; // [NUEVO]
        const raycaster = new THREE.Raycaster();
        const tooltip = document.getElementById('tooltip');

        // Array para rastrear los planos de emojis y rotarlos
        let eventEmojiPlanes = [];

        function updateEvents() {
            eventEmojiPlanes.forEach(plane => {
                // 1. Obtenemos la posición global del emoji para que no se mueva de su sitio
                const worldPos = new THREE.Vector3();
                plane.getWorldPosition(worldPos);

                // 2. FORZAMOS al emoji a mirar a la cámara ignorando al padre
                // .quaternion es la rotación local, pero al usar .setFromRotationMatrix 
                // con la matriz de la cámara, lo alineamos con la pantalla.
                plane.quaternion.copy(camera.quaternion);

                // 3. Importante: Como el pinGroup está rotado, el emoji heredará una 
                // rotación inversa. Para anularla, calculamos la rotación global deseada:
                plane.matrixWorld.makeRotationFromQuaternion(camera.quaternion);
                plane.matrixWorld.setPosition(worldPos);

                // Descomponemos la matriz para que la rotación local sea la correcta 
                // respecto al mundo, no respecto al pin.
                if (plane.parent) {
                    const m1 = new THREE.Matrix4();
                    m1.copy(plane.parent.matrixWorld).invert();
                    plane.quaternion.setFromRotationMatrix(m1.multiply(plane.matrixWorld));
                }
            });
        }

        // --- FUNCIÓN PRINCIPAL DE RENDERIZADO POR AÑO ---
        function renderYear(year) {
            empiresGroup.clear();
            eventsGroup.clear(); // [NUEVO] Limpiar eventos anteriores

            // Buscar los datos más cercanos al año seleccionado
            const data = timeline.reduce((p, c) => Math.abs(c.year - year) < Math.abs(p.year - year) ? c : p);

            // Actualizar UI y variables de estado
            document.getElementById('year-display').innerText = data.label;
            currentEmpiresData = data.empires;
            currentEventsData = data.events || [];

            // --- PUNTO 1: MODO NOCHE DINÁMICO ---
            if (year >= 2023) {
                // 1. Fondo de la escena a Negro Absoluto (Cero tintes)
                scene.background = new THREE.Color(0x000000);
                if (scene.fog) scene.fog = null;

                globe.material = new THREE.MeshBasicMaterial({
                    map: textureNight,
                    transparent: false,
                    opacity: 0.8,
                    color: 0x888888,
                    blending: THREE.NoBlending
                });

            } else {
                // --- RESET MODO DÍA ---
                scene.background = new THREE.Color(0x050508); // Tu color oscuro original
                globe.material = globeMaterial; // Volvemos al material con luces
                globeMaterial.map = textureDay;

                // Volvemos a hacer todo visible
                scene.traverse((obj) => { obj.visible = true; });
                empiresGroup.visible = true;
            }
            globeMaterial.needsUpdate = true;


            // --- RENDERIZAR IMPERIOS (ÁREAS) ---
            // (Tu código existente que ya funciona 'que te cagas')
            data.empires.forEach(emp => {
                const lats = emp.points.map(p => p[1]);
                const lons = emp.points.map(p => p[0]);
                const minLat = Math.min(...lats), maxLat = Math.max(...lats);
                const minLon = Math.min(...lons), maxLon = Math.max(...lons);

                const geo = new THREE.SphereGeometry(1.02, 32, 32,
                    (minLon + 180) * Math.PI / 180, (maxLon - minLon) * Math.PI / 180,
                    (90 - maxLat) * Math.PI / 180, (maxLat - minLat) * Math.PI / 180
                );

                const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: emp.color, transparent: true, opacity: 0.6, side: THREE.DoubleSide, depthWrite: false }));
                mesh.renderOrder = 10;
                // Guardamos info para el raycaster 2D
                mesh.userData = { type: 'empire', data: emp };

                const edgePts = [...emp.points, emp.points[0]].map(p => latLonToVec3(p[1], p[0], 1.025));
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(edgePts), new THREE.LineBasicMaterial({ color: emp.color }));
                line.renderOrder = 11;

                empiresGroup.add(mesh);
                empiresGroup.add(line);
            });

            // --- PUNTO 2: RENDERIZAR EVENTOS GLOBALES (PUNTOS) [NUEVO] ---
            // --- PUNTO 2: RENDERIZAR EVENTOS GLOBALES (PINS ROJOS) ---
            // --- PUNTO 2: RENDERIZAR EVENTOS GLOBALES (PIN ROJO CORREGIDO) ---
            // --- RENDERIZAR EVENTOS GLOBALES (PIN + EMOJI) ---
            if (data.events) {
                eventEmojiPlanes = []; // Limpiar array de rotación
                data.events.forEach(evt => {
                    const pinGroup = new THREE.Group();
                    const redMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

                    // 1. El cono
                    const tipGeo = new THREE.ConeGeometry(0.012, 0.03, 16);
                    const tip = new THREE.Mesh(tipGeo, redMat);
                    tip.rotation.x = Math.PI;
                    tip.position.y = 0.013;
                    pinGroup.add(tip);

                    // 2. La cabeza
                    const headGeo = new THREE.SphereGeometry(0.012, 16, 16);
                    const head = new THREE.Mesh(headGeo, redMat);
                    head.position.y = 0.03;
                    pinGroup.add(head);

                    // 3. EMOJI DINÁMICO (Canvas)
                    const canvas = document.createElement('canvas');
                    canvas.width = 64;
                    canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.font = '48px serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(evt.iconUrl || '📍', 32, 32);

                    const texture = new THREE.CanvasTexture(canvas);
                    const emojiGeo = new THREE.PlaneGeometry(0.06, 0.06);
                    const emojiMat = new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        side: THREE.DoubleSide
                    });
                    // ... dentro del loop de data.events
                    const emojiPlane = new THREE.Mesh(emojiGeo, emojiMat);

                    // IMPORTANTE: Lo subimos en el eje Y local del Pin para que flote sobre la cabeza
                    emojiPlane.position.y = 0.08;

                    // Guardamos la posición global inicial para usarla en el animate
                    emojiPlane.userData = {
                        type: 'event',
                        data: evt,
                        isEmoji: true // Flag para identificarlo en el animate
                    };

                    pinGroup.add(emojiPlane);
                    eventEmojiPlanes.push(emojiPlane);

                    // 4. Posicionamiento en el globo
                    const pos = latLonToVec3(evt.lat, evt.lon, 1.01);
                    pinGroup.position.copy(pos);
                    const direction = pos.clone().normalize();
                    pinGroup.lookAt(pos.clone().add(direction));
                    pinGroup.rotateX(Math.PI / 2);

                    eventsGroup.add(pinGroup);
                });
            }
        }

        window.addEventListener('click', onDocumentMouseDown, false);
        window.addEventListener('touchstart', onDocumentMouseDown, false);

        function onDocumentMouseDown(event) {
            // Si es un toque táctil, ajustamos las coordenadas
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            // Convertimos la posición del click a coordenadas de Three.js (-1 a +1)
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            // Lanzamos el rayo
            raycaster.setFromCamera(mouse, camera);

            // Calculamos los objetos que chocan con el rayo
            // Aquí es donde buscas tu grupo de imperios o el globo
            const intersects = raycaster.intersectObjects(empiresGroup.children);

            if (intersects.length > 0) {
                // ¡HEMOS TOCADO UN IMPERIO!
                const selectedObject = intersects[0].object;

                // Buscamos los datos del imperio que guardamos en el objeto
                // (Asumiendo que guardaste la info en .userData al crearlos)
                const data = selectedObject.userData;

                // AQUÍ ES DONDE LLAMAS A LA FUNCIÓN QUE ACTUALIZA EL PANEL
                onEmpireClick(data);
            }
        }

        // 2. LA FUNCIÓN QUE ACTUALIZA EL HTML (Ponla en cualquier parte fuera de otras funciones)
        function onEmpireClick(empireData) {
            const panel = document.getElementById('info-panel');
            const title = document.getElementById('info-title');
            const desc = document.getElementById('info-desc');
            const fact = document.getElementById('info-fact');

            if (!empireData.name) return; // Seguridad

            title.innerHTML = `<strong>${empireData.name}</strong>`;
            desc.innerText = empireData.desc;
            fact.innerText = "💡 " + empireData.fact;

            // Animación de feedback visual
            panel.style.display = 'block'; // Por si estaba oculto
            panel.classList.add('active');
        }

        window.addEventListener('mousemove', (event) => {
            // Detectamos si es móvil una sola vez por evento
            const isMobile = window.innerWidth <= 768;

            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouse, camera);

            tooltip.style.display = 'none';
            tooltip.className = '';

            const eventIntersects = raycaster.intersectObjects(eventsGroup.children, true); // El 'true' es vital

            if (eventIntersects.length > 0) {
                let obj = eventIntersects[0].object;
                let evtData = obj.userData.data;
                if (!evtData && obj.parent) evtData = obj.parent.userData.data;

                if (evtData) {
                    tooltip.style.display = 'block';
                    tooltip.style.left = isMobile ? '20px' : (event.clientX + 20) + 'px';
                    tooltip.style.width = isMobile ? 'calc(100% - 40px)' : '';
                    tooltip.style.top = (event.clientY + 20) + 'px';
                    tooltip.className = 'event-tooltip';
                    tooltip.innerHTML = `
                <div class="event-tag">${evtData.iconUrl} EVENTO GLOBAL</div>
                <h3>${evtData.name}</h3>
                <p style="color: #00bcd4; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px;">${evtData.date}</p>
                <p style="color: #eee; margin-bottom: 10px;">${evtData.desc}</p>
                <div style="background: rgba(0,188,212,0.1); border-left: 3px solid #00bcd4; padding: 8px;">
                    <p style="font-style: italic; font-size: 0.8rem; color: #fff; margin:0;">${evtData.fact}</p>
                </div>
            `;
                }

                return;
            }

            const globeIntersects = raycaster.intersectObject(globe);

            if (globeIntersects.length > 0) {
                const p = globeIntersects[0].point.clone().normalize();
                const lat = Math.asin(p.y) * (180 / Math.PI);
                let lon = Math.atan2(-p.z, p.x) * (180 / Math.PI);

                const found = currentEmpiresData.find(emp => isPointInPoly([lon, lat], emp.points));

                if (found) {
                    tooltip.style.display = 'block';
                    tooltip.style.left = isMobile ? '20px' : (event.clientX + 20) + 'px';
                    tooltip.style.width = isMobile ? 'calc(100% - 40px)' : '';
                    tooltip.style.top = (event.clientY + 20) + 'px';

                    tooltip.innerHTML = `
                <div style="border-left: 4px solid ${'#' + found.color.toString(16).padStart(6, '0')}; padding-left: 10px;">
                    <span class="tag">${found.status}</span>
                    <h3 style="margin: 2px 0; color: #ff9800;">${found.name}</h3>
                    <p style="font-size: 0.9rem; color: #ccc; margin-bottom: 8px;">${found.desc}</p>
                    <div style="background: rgba(255,152,0,0.1); padding: 10px; border: 1px solid rgba(255,152,0,0.3); border-radius: 4px;">
                        <strong style="color: #ff9800; font-size: 0.7rem; display: block; margin-bottom: 3px;">💡 DATO CURIOSO</strong>
                        <p style="font-style: italic; font-size: 0.85rem; margin: 0; color: #fff;">${found.fact}</p>
                    </div>
                </div>
            `;
                }
            }
        });

        document.getElementById('year-slider').addEventListener('input', (e) => {
            renderYear(parseInt(e.target.value));
        });

        function animate() {
            requestAnimationFrame(animate);
            // Las nubes solo rotan si están visibles (Modo Día)
            if (cloudMesh.visible) {
                cloudMesh.rotation.y += 0.0001;
            }
            updateEvents();
            controls.update();
            renderer.render(scene, camera);
        }
        renderYear(117);
        animate();
