        const globeGeometry = new THREE.SphereGeometry(1, 64, 64);
        // Usamos MeshStandardMaterial para que reaccione mejor a la luz y permita mapas de emisión
        const globeMaterial = new THREE.MeshStandardMaterial({
            map: textureDay,
            metalness: 0.1,
            roughness: 0.8
        });
        const globe = new THREE.Mesh(globeGeometry, globeMaterial);
        globe.name = "tierra";

        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.005 });

            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() - 0.5) * 2000;
            starVertices.push(x, y, z);

            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(-rad * Math.sin(phi) * Math.cos(theta), rad * Math.cos(phi), rad * Math.sin(phi) * Math.sin(theta));
        }

        // Función para saber si un punto está dentro de un polígono 2D
        function isPointInPoly(pt, poly) {
            let isInside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                if (((poly[i][1] > pt[1]) !== (poly[j][1] > pt[1])) &&
                    (pt[0] < (poly[j][0] - poly[i][0]) * (pt[1] - poly[i][1]) / (poly[j][1] - poly[i][1]) + poly[i][0])) {
                    isInside = !isInside;
                }
            }
            return isInside;
        }

                    { name: "Marruecos", color: 0xcc0000, points: [[-10, 30], [-2, 35], [-5, 28]], status: "Energía Solar", desc: "Líder en renovables.", fact: "Tienen una de las plantas solares más grandes del mundo, visible desde el espacio." },
                    // AMÉRICA
                    { name: "Estados Unidos", color: 0x0000ff, points: [[-125, 30], [-70, 48], [-90, 30]], status: "Potencia Militar", desc: "Silicon Valley / Wall Street.", fact: "Solo la economía del estado de California es más grande que la de la mayoría de países de Europa." },
                    { name: "Brasil", color: 0x009944, points: [[-70, -10], [-35, -5], [-50, -30]], status: "Pulmón del Mundo", desc: "Poder agrícola.", fact: "Es el país con mayor biodiversidad del planeta; hay tribus en el Amazonas que aún no han sido contactadas." },
                    { name: "Canadá", color: 0xff0000, points: [[-130, 50], [-60, 70], [-80, 45]], status: "Multiculturalismo", desc: "Recursos naturales.", fact: "Tienen más lagos que el resto de los países del mundo juntos." },
                    { name: "México", color: 0x006622, points: [[-115, 20], [-90, 32], [-100, 15]], status: "Nearshoring", desc: "Potencia manufacturera.", fact: "La Ciudad de México se está hundiendo unos 10-12 cm al año porque fue construida sobre un lago." },
                    { name: "Chile", color: 0xff0000, points: [[-75, -30], [-68, -20], [-72, -55]], status: "Cobre y Litio", desc: "Economía estable.", fact: "Tienen el lugar más seco de la Tierra (Desierto de Atacama), donde hay zonas donde nunca se ha registrado lluvia." }
                ],
                events: [
                    { name: "Estación Espacial Internacional", lat: 0, lon: 0, iconUrl: '🏠', date: "Actualidad", desc: "Laboratorio de investigación en órbita terrestre baja.", fact: "Es el objeto individual más caro jamás construido por la humanidad." },
                    {
                        name: "Exploración de Marte (Perseverance)",
                        lat: 18.4, lon: 77.5, // Coordenadas simbólicas en el planeta Tierra (Cabo Cañaveral)
                        iconUrl: '🚀',
                        date: "Actualidad",
                        desc: "Búsqueda de vida antigua en el cráter Jezero.",
                        fact: "El rover lleva un pequeño helicóptero llamado Ingenuity, el primer objeto en volar en otro planeta."
                    }
                ]
            }
        ];

        // --- VARIABLES DE ESTADO GLOBALES ---
        let currentEmpiresData = [];
        let currentEventsData = []; // [NUEVO]
        const raycaster = new THREE.Raycaster();
        const tooltip = document.getElementById('tooltip');

        // --- FUNCIÓN PRINCIPAL DE RENDERIZADO POR AÑO ---
        function renderYear(year) {
            empiresGroup.clear();
            eventsGroup.clear(); // [NUEVO] Limpiar eventos anteriores

            // Buscar los datos más cercanos al año seleccionado
            const data = timeline.reduce((p, c) => Math.abs(c.year - year) < Math.abs(p.year - year) ? c : p);

            // Actualizar UI y variables de estado
            document.getElementById('year-display').innerText = data.label;
            currentEmpiresData = data.empires;
            currentEventsData = data.events || [];

            // --- PUNTO 1: MODO NOCHE DINÁMICO ---
            if (year >= 2023) {
                // 1. Fondo de la escena a Negro Absoluto (Cero tintes)
                scene.background = new THREE.Color(0x000000);
                if (scene.fog) scene.fog = null;

                globe.material = new THREE.MeshBasicMaterial({
                    map: textureNight,
                    transparent: false,
                    opacity: 0.8,
                    color: 0xaaaaaa,
                    blending: THREE.NoBlending
                });

            } else {
                // --- RESET MODO DÍA ---
                scene.background = new THREE.Color(0x050508); // Tu color oscuro original
                globe.material = globeMaterial; // Volvemos al material con luces
                globeMaterial.map = textureDay;

                // Volvemos a hacer todo visible
                scene.traverse((obj) => { obj.visible = true; });
                empiresGroup.visible = true;
            }
            globeMaterial.needsUpdate = true;


            // --- RENDERIZAR IMPERIOS (ÁREAS) ---
            // (Tu código existente que ya funciona 'que te cagas')
            data.empires.forEach(emp => {
                const lats = emp.points.map(p => p[1]);
                const lons = emp.points.map(p => p[0]);
                const minLat = Math.min(...lats), maxLat = Math.max(...lats);
                const minLon = Math.min(...lons), maxLon = Math.max(...lons);

                const geo = new THREE.SphereGeometry(1.02, 32, 32,
                    (minLon + 180) * Math.PI / 180, (maxLon - minLon) * Math.PI / 180,
                    (90 - maxLat) * Math.PI / 180, (maxLat - minLat) * Math.PI / 180
                );

                const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: emp.color, transparent: true, opacity: 0.6, side: THREE.DoubleSide, depthWrite: false }));
                mesh.renderOrder = 10;
                // Guardamos info para el raycaster 2D
                mesh.userData = { type: 'empire', data: emp };

                const edgePts = [...emp.points, emp.points[0]].map(p => latLonToVec3(p[1], p[0], 1.025));
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(edgePts), new THREE.LineBasicMaterial({ color: emp.color }));
                line.renderOrder = 11;

                empiresGroup.add(mesh);
                empiresGroup.add(line);
            });

            // --- PUNTO 2: RENDERIZAR EVENTOS GLOBALES (PUNTOS) [NUEVO] ---
            // --- PUNTO 2: RENDERIZAR EVENTOS GLOBALES (PINS ROJOS) ---
            // --- PUNTO 2: RENDERIZAR EVENTOS GLOBALES (PIN ROJO CORREGIDO) ---
            if (data.events) {
                data.events.forEach(evt => {
                    const pinGroup = new THREE.Group();
                    const redMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

                    // 1. El cono (Punta hacia abajo)
                    const tipGeo = new THREE.ConeGeometry(0.012, 0.03, 16);
                    const tip = new THREE.Mesh(tipGeo, redMat);

                    // ROTACIÓN CLAVE: Invertimos el cono 180 grados para que el pico mire abajo
                    tip.rotation.x = Math.PI;
                    // Lo subimos la mitad de su altura para que el pico quede en el 0,0,0 local
                    tip.position.y = 0.013;
                    pinGroup.add(tip);

                    // 2. La cabeza (Esfera arriba)
                    const headGeo = new THREE.SphereGeometry(0.012, 16, 16);
                    const head = new THREE.Mesh(headGeo, redMat);
                    // La colocamos en la base ancha del cono (que ahora está arriba)
                    head.position.y = 0.03;
                    pinGroup.add(head);

                    // 3. Posicionamiento en el globo
                    const pos = latLonToVec3(evt.lat, evt.lon, 1.01);
                    pinGroup.position.copy(pos);

                    // 4. Orientación: El grupo debe mirar hacia afuera del globo
                    // Usamos una dirección que vaya desde el centro de la tierra hacia la posición del pin
                    const direction = pos.clone().normalize();
                    const targetPos = pos.clone().add(direction);
                    pinGroup.lookAt(targetPos);

                    // Ajuste final de eje para que el "arriba" del pin coincida con el "afuera" del globo
                    pinGroup.rotateX(Math.PI / 2);

                    // 5. Datos para el Raycaster
                    head.userData = { type: 'event', data: evt };
                    tip.userData = { type: 'event', data: evt };

                    eventsGroup.add(pinGroup);
                });
            }
        }

        // --- INTERACCIÓN (MouseMove / Hover) ACTUALIZADA [NUEVO] ---
        window.addEventListener('mousemove', (event) => {
            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouse, camera);

            // Ocultar tooltip por defecto
            tooltip.style.display = 'none';
            tooltip.className = ''; // Limpiar clases especiales

            // 1. Detección Prioritaria: Eventos Globales (Raycasting 3D directo sobre los marcadores)
            const eventIntersects = raycaster.intersectObjects(eventsGroup.children);

            if (eventIntersects.length > 0) {
                const evtData = eventIntersects[0].object.userData.data;

                tooltip.style.display = 'block';
                tooltip.style.left = (event.clientX + 20) + 'px';
                tooltip.style.top = (event.clientY + 20) + 'px';
                tooltip.className = 'event-tooltip'; // Aplicar estilo Cyan

                tooltip.innerHTML = `
                <div class="event-tag">${evtData.iconUrl} EVENTO GLOBAL</div>
                <h3>${evtData.name}</h3>
                <p style="color: #00bcd4; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px;">${evtData.date}</p>
                <p style="color: #eee; margin-bottom: 10px;">${evtData.desc}</p>
                <div style="background: rgba(0,188,212,0.1); border-left: 3px solid #00bcd4; padding: 8px;">
                    <p style="font-style: italic; font-size: 0.8rem; color: #fff; margin:0;">${evtData.fact}</p>
                </div>
            `;
                return; // Si encontramos evento, no buscamos imperio
            }

            // 2. Detección Secundaria: Imperios (Cálculo 2D lat/lon sobre el globo)
            const globeIntersects = raycaster.intersectObject(globe);

            if (globeIntersects.length > 0) {
                const p = globeIntersects[0].point.clone().normalize();
                const lat = Math.asin(p.y) * (180 / Math.PI);
                // Matemática blindada que ya te funciona
                let lon = Math.atan2(-p.z, p.x) * (180 / Math.PI);

                // Buscar en el array de imperios actuales
                const found = currentEmpiresData.find(emp => isPointInPoly([lon, lat], emp.points));

                if (found) {
                    tooltip.style.display = 'block';
                    tooltip.style.left = (event.clientX + 20) + 'px';
                    tooltip.style.top = (event.clientY + 20) + 'px';

                    // Usamos tu innerHTML original que te funciona 'que te cagas'
                    tooltip.innerHTML = `
                    <div style="border-left: 4px solid ${'#' + found.color.toString(16).padStart(6, '0')}; padding-left: 10px;">
                        <span class="tag">${found.status}</span>
                        <h3 style="margin: 2px 0; color: #ff9800;">${found.name}</h3>
                        <p style="font-size: 0.9rem; color: #ccc; margin-bottom: 8px;">${found.desc}</p>
                        <div style="background: rgba(255,152,0,0.1); padding: 10px; border: 1px solid rgba(255,152,0,0.3); border-radius: 4px;">
                            <strong style="color: #ff9800; font-size: 0.7rem; display: block; margin-bottom: 3px;">💡 DATO CURIOSO</strong>
                            <p style="font-style: italic; font-size: 0.85rem; margin: 0; color: #fff;">${found.fact}</p>
                        </div>
                    </div>
                `;
                }
            }
        });

        // --- EVENTOS DE UI ---
        document.getElementById('year-slider').addEventListener('input', (e) => {
            renderYear(parseInt(e.target.value));
        });

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            // Las nubes solo rotan si están visibles (Modo Día)
            if (cloudMesh.visible) {
                cloudMesh.rotation.y += 0.0001;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        // --- INICIO ---
        // Asegúrate de que el slider tenga el rango correcto: min="117" max="2024"
        renderYear(117);
        animate();

    </script>
</body>

</html>
